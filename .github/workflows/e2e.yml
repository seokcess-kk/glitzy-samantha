name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # 환경변수는 job 레벨에서 정의 — step의 `if:` 조건에서 secrets 컨텍스트 직접
    # 참조는 GitHub이 거부하므로 (워크플로우 파일 유효성 실패), env로 한 번 받아서 사용.
    env:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'test-secret-for-ci' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_SUPERADMIN_EMAIL: ${{ secrets.E2E_SUPERADMIN_EMAIL }}
      E2E_SUPERADMIN_PASSWORD: ${{ secrets.E2E_SUPERADMIN_PASSWORD }}
      E2E_CLINIC_EMAIL: ${{ secrets.E2E_CLINIC_EMAIL }}
      E2E_CLINIC_PASSWORD: ${{ secrets.E2E_CLINIC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      # Supabase secrets가 없으면 dev server가 'supabaseKey is required'로 응답해
      # 모든 페이지가 빈 body로 나와 테스트가 timeout 됨 → 두 test step 모두 secrets
      # 누락 시 skip(워크플로우는 success). Repository Secrets 설정 시 자동으로 실행.
      - name: Run E2E tests (no auth)
        if: env.SUPABASE_SERVICE_ROLE_KEY != ''
        run: npx playwright test --project=chromium-no-auth

      - name: Run E2E tests (authenticated)
        if: env.SUPABASE_SERVICE_ROLE_KEY != '' && env.E2E_SUPERADMIN_EMAIL != ''
        run: npx playwright test --project=chromium

      - name: Notify if tests skipped
        if: env.SUPABASE_SERVICE_ROLE_KEY == ''
        run: |
          echo "::warning::E2E tests skipped — Supabase secrets not configured."
          echo "::warning::Set SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY in Repository Secrets to enable."

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
